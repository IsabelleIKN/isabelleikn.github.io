<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokédex Binder Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f4;
  --card:#fff;
  --border:#e0e0e0;
  --text:#1a1a1a;
  --muted:#999;
  --accent:#e63946;
  --miss-bg:#e0e0e0;--miss-fg:#777;
  --reg-bg:#3a86ff;--reg-fg:#fff;
  --ill-bg:#f4a823;--ill-fg:#fff;
  --rform-bg:#f0ebff;
  --rtag-bg:#dcceff;--rtag-fg:#5500b5;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:15px}
#header{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.06)}
h1{font-size:17px;font-weight:700;margin-bottom:5px}
.stats{display:flex;gap:14px;font-size:12px;color:var(--muted)}
.stats b{color:var(--text)}
#controls{background:#fff;border-bottom:1px solid var(--border);padding:10px 12px;display:flex;flex-direction:column;gap:8px}
#search{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;width:100%;outline:none;background:#fafafa}
#search:focus{border-color:#aaa;background:#fff}
.frow{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:4px 10px;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer;font-size:12px;white-space:nowrap;transition:background .12s,color .12s,border-color .12s;-webkit-tap-highlight-color:transparent}
.fbtn.active{background:var(--text);color:#fff;border-color:var(--text)}
#export-btn{padding:10px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent}
#export-btn:active{opacity:.85}
#list{padding-bottom:48px}
.gen-section{}
.gen-hdr{padding:5px 14px;background:#ebebeb;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.prow{background:var(--card);border-bottom:1px solid var(--border)}
.prow.rf{background:var(--rform-bg)}
.rmain{display:flex;align-items:center;padding:8px 10px;gap:9px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.rmain:active{background:rgba(0,0,0,.04)}
.prow.rf .rmain:active{background:rgba(120,0,220,.06)}
.dnum{font-size:11px;color:var(--muted);width:36px;flex-shrink:0;font-variant-numeric:tabular-nums}
.pname{flex:1;font-size:14px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.3}
.rtag{font-size:10px;font-weight:600;color:var(--rtag-fg);background:var(--rtag-bg);padding:1px 6px;border-radius:10px;flex-shrink:0}
.sbtn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:transform .1s;-webkit-tap-highlight-color:transparent}
.sbtn:active{transform:scale(.88)}
.s-missing{background:var(--miss-bg);color:var(--miss-fg)}
.s-regular{background:var(--reg-bg);color:var(--reg-fg)}
.s-illustration{background:var(--ill-bg);color:var(--ill-fg)}
.nwrap{max-height:0;overflow:hidden;transition:max-height .2s ease}
.nwrap.open{max-height:400px}
.ninner{padding:0 10px 10px 55px}
.ninput{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;resize:vertical;min-height:54px;font-family:inherit;outline:none;line-height:1.4}
.ninput:focus{border-color:#aaa}
.empty{padding:48px 20px;text-align:center;color:var(--muted);font-size:14px}
#top-btn{position:fixed;bottom:20px;right:16px;z-index:30;width:42px;height:42px;border-radius:50%;background:var(--text);color:#fff;border:none;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.25);-webkit-tap-highlight-color:transparent;transition:opacity .15s}
#top-btn.show{display:flex}
#top-btn:active{opacity:.75}
/* ── Progress bar ── */
.gen-hdr{display:flex;align-items:baseline;justify-content:space-between}
.gen-prog{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none;white-space:nowrap}
.prog-bar{height:3px;background:#d8d8d8;margin:0 0 0 0}
.prog-fill{height:100%;background:var(--reg-bg);transition:width .3s}
.prog-fill.done{background:var(--ill-bg)}
/* ── illEx indicator & toggle ── */
.ill-dot{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--ill-bg);color:#fff;font-size:9px;font-weight:700;flex-shrink:0;vertical-align:middle}
.ill-ex-row{display:flex;align-items:center;gap:8px;padding-bottom:8px;font-size:13px;color:var(--text);cursor:pointer}
.ill-ex-row input{width:15px;height:15px;cursor:pointer;accent-color:var(--ill-bg);flex-shrink:0}
/* ── View toggle ── */
.view-toggle{display:flex;gap:4px}
.vtbtn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;-webkit-tap-highlight-color:transparent;transition:background .12s,color .12s}
.vtbtn.active{background:var(--text);color:#fff;border-color:var(--text)}
.bottom-row{display:flex;gap:8px;align-items:center}
#export-btn{flex:1}
/* ── Grid view ── */
.gcells{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:3px;padding:8px 8px 4px}
.gcell{border-radius:6px;padding:5px 4px 4px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;display:flex;flex-direction:column;align-items:center;min-height:54px;justify-content:center;user-select:none;transition:opacity .1s}
.gcell:active{opacity:.65}
.gcell.s-missing{background:var(--miss-bg)}
.gcell.s-regular{background:var(--reg-bg)}
.gcell.s-illustration{background:var(--ill-bg)}
.gcell.rf{box-shadow:inset 0 0 0 2px rgba(120,0,220,.3)}
.gdex{font-size:9px;font-weight:600;line-height:1;color:rgba(255,255,255,.65)}
.gcell.s-missing .gdex{color:rgba(0,0,0,.3)}
.gname{font-size:10px;font-weight:600;text-align:center;line-height:1.2;margin-top:2px;word-break:break-word;hyphens:auto;color:#fff;max-width:100%}
.gcell.s-missing .gname{color:rgba(0,0,0,.55)}
.gill{position:absolute;top:3px;right:4px;font-size:9px;color:rgba(255,255,255,.75);line-height:1}
.gcell.s-missing .gill{color:rgba(180,90,0,.65)}
</style>
</head>

</div>

// ── State & helpers ─────────────────────────────────────────────────
const STATUSES=['missing','regular','illustration'];
const ICONS={missing:'–',regular:'●',illustration:'★'};
let state={};
const openRows=new Set();
let activeGen='all',activeStatus='all',sq='',viewMode='list';

function mkId(name){
  return name.toLowerCase()
    .replace(/♀/g,'f').replace(/♂/g,'m')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

const POKEMON=ROSTER.map(([dex,name,gen,regional])=>({
  id:mkId(name),dex,name,gen,regional:regional||null
}));

// Precompute base-Pokémon dex for each regional form (for sorting)
const RORDER=['Alolan','Galarian','Hisuian','Paldean','Form'];
const BASE_DEX={};
for(const p of POKEMON){
  if(!p.regional)continue;
  const baseName=p.name
    .replace(/^(?:Alolan|Galarian|Hisuian|Paldean)\s+/,'')
    .replace(/\s*\(.*\)$/,'');
  const base=POKEMON.find(q=>!q.regional&&q.name===baseName);
  BASE_DEX[p.id]=base?base.dex:9999;
}

function gs(id){return state[id]||{status:'missing',note:'',illEx:false};}

function cycleStatus(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  const next=STATUSES[(STATUSES.indexOf(gs(id).status)+1)%STATUSES.length];
  state[id]={...gs(id),status:next};
  saveLocal();
  // list mode: update the status button
  const btn=document.querySelector('[data-id="'+id+'"] .sbtn');
  if(btn){btn.className='sbtn s-'+next;btn.textContent=ICONS[next];}
  // grid mode: update the cell colour
  const cell=document.querySelector('.gcell[data-id="'+id+'"]');
  if(cell){STATUSES.forEach(s=>cell.classList.remove('s-'+s));cell.classList.add('s-'+next);}
  updateStats();
}

function saveNote(id,val){
  state[id]={...gs(id),note:val};
  saveLocal();
}

function toggleIllEx(id,val){
  state[id]={...gs(id),illEx:!!val};
  saveLocal();
  // update the ★ dot in the row name without re-rendering
  const dot=document.querySelector('[data-id="'+id+'"] .ill-dot');
  if(val&&!dot){
    const pname=document.querySelector('[data-id="'+id+'"] .pname');
    if(pname)pname.insertAdjacentHTML('beforeend','<span class="ill-dot">★</span>');
  } else if(!val&&dot){dot.remove();}
  updateStats();
}

function saveLocal(){
  try{localStorage.setItem('pkdx-binder',JSON.stringify(state));}catch(_){}
}

function updateStats(){
  const tot=POKEMON.length;
  const hav=POKEMON.filter(p=>gs(p.id).status!=='missing').length;
  const ill=POKEMON.filter(p=>gs(p.id).status==='illustration').length;
  const illEx=POKEMON.filter(p=>gs(p.id).illEx).length;
  document.getElementById('st-tot').textContent=tot;
  document.getElementById('st-hav').textContent=hav;
  document.getElementById('st-ill').textContent=ill;
  document.getElementById('st-ill-ex').textContent=illEx;
}

async function loadData(){
  try{
    const r=await fetch('./data.json');
    if(!r.ok)throw 0;
    state=await r.json();
  }catch(_){
    try{const s=localStorage.getItem('pkdx-binder');if(s)state=JSON.parse(s);}catch(_){}
  }
  render();
}

function matches(p){
  if(sq){
    const stripped=sq.replace(/^#+/,'');
    const byNum=/^\d+$/.test(stripped)&&p.dex===+stripped;
    const byName=p.name.toLowerCase().includes(stripped);
    if(!byName&&!byNum)return false;
  }
  if(activeGen!=='all'&&p.gen!==+activeGen)return false;
  if(activeStatus==='missing-ill') return gs(p.id).illEx&&gs(p.id).status!=='illustration';
  if(activeStatus!=='all'&&gs(p.id).status!==activeStatus)return false;
  return true;
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(){
  let html='';
  for(let g=1;g<=9;g++){
    // All Pokémon in this gen (unfiltered) for progress stats
    const allBase=POKEMON.filter(p=>p.gen===g&&!p.regional);
    const allRf=POKEMON.filter(p=>p.gen===g&&p.regional);
    const allG=[...allBase,...allRf];
    // Filtered list for display
    const base=allBase.filter(matches);
    const rf=allRf.filter(matches).sort((a,b)=>{
      const rd=RORDER.indexOf(a.regional)-RORDER.indexOf(b.regional);
      return rd!==0?rd:BASE_DEX[a.id]-BASE_DEX[b.id];
    });
    if(!base.length&&!rf.length)continue;

    const haveN=allG.filter(p=>gs(p.id).status!=='missing').length;
    const illExN=allG.filter(p=>gs(p.id).illEx).length;
    const pct=allG.length?Math.round(haveN/allG.length*100):0;
    const done=haveN===allG.length;

    html+=
      '<div class="gen-section">'+
      '<div class="gen-hdr">Generation '+g+
        '<span class="gen-prog">'+haveN+' / '+allG.length+(illExN?' &nbsp;★ '+illExN:'')+'</span>'+
      '</div>'+
      '<div class="prog-bar"><div class="prog-fill'+(done?' done':'')+'" style="width:'+pct+'%"></div></div>';

    if(viewMode==='grid'){
      html+='<div class="gcells">';
      for(const p of [...base,...rf]){
        const st=gs(p.id).status,illEx=gs(p.id).illEx;
        const dnum=p.dex?'#'+String(p.dex).padStart(4,'0'):'';
        html+=
          '<div class="gcell s-'+st+(p.regional?' rf':'')+'" data-id="'+p.id+
          '" onclick="cycleStatus(\''+p.id+'\',event)" title="'+esc(p.name)+'">'+
          (illEx?'<span class="gill">★</span>':'')+
          '<span class="gdex">'+dnum+'</span>'+
          '<span class="gname">'+esc(p.name)+'</span>'+
          '</div>';
      }
      html+='</div>';
    } else {
      for(const p of [...base,...rf]){
        const st=gs(p.id).status,note=gs(p.id).note,illEx=gs(p.id).illEx;
        const open=openRows.has(p.id)||!!note;
        const dnum=p.dex?'#'+String(p.dex).padStart(4,'0'):'';
        html+=
          '<div class="prow'+(p.regional?' rf':'')+'" data-id="'+p.id+'">'+
          '<div class="rmain" onclick="toggleRow(\''+p.id+'\')">'+
          '<span class="dnum">'+dnum+'</span>'+
          '<span class="pname">'+esc(p.name)+
            (p.regional?'<span class="rtag">'+p.regional+'</span>':'')+
            (illEx?'<span class="ill-dot">★</span>':'')+
          '</span>'+
          '<button class="sbtn s-'+st+'" onclick="cycleStatus(\''+p.id+'\',event)">'+ICONS[st]+'</button>'+
          '</div>'+
          '<div class="nwrap'+(open?' open':'')+'" id="nw-'+p.id+'">'+
          '<div class="ninner">'+
          '<label class="ill-ex-row">'+
            '<input type="checkbox" '+(illEx?'checked':'')+' onchange="toggleIllEx(\''+p.id+'\',this.checked)">'+
            ' Full art available'+
          '</label>'+
          '<textarea class="ninput" placeholder="Notes…" oninput="saveNote(\''+p.id+'\',this.value)">'+esc(note)+'</textarea>'+
          '</div></div></div>';
      }
    }
    html+='</div>';
  }
  document.getElementById('list').innerHTML=html||'<div class="empty">No Pokémon match your filters.</div>';
  updateStats();
}

function toggleRow(id){
  if(openRows.has(id))openRows.delete(id);else openRows.add(id);
  const el=document.getElementById('nw-'+id);
  if(el)el.classList.toggle('open',openRows.has(id));
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='data.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

// ── Event listeners ─────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  sq=e.target.value.trim().toLowerCase();render();
});
document.getElementById('gf').addEventListener('click',e=>{
  const b=e.target.closest('[data-gen]');if(!b)return;
  activeGen=b.dataset.gen;
  document.querySelectorAll('#gf .fbtn').forEach(x=>x.classList.toggle('active',x===b));
  render();
});
document.getElementById('sf').addEventListener('click',e=>{
  const b=e.target.closest('[data-status]');if(!b)return;
  activeStatus=b.dataset.status;
  document.querySelectorAll('#sf .fbtn').forEach(x=>x.classList.toggle('active',x===b));
  render();
});
document.getElementById('export-btn').addEventListener('click',exportData);

document.getElementById('vt-list').addEventListener('click',function(){
  viewMode='list';
  this.classList.add('active');
  document.getElementById('vt-grid').classList.remove('active');
  render();
});
document.getElementById('vt-grid').addEventListener('click',function(){
  viewMode='grid';
  this.classList.add('active');
  document.getElementById('vt-list').classList.remove('active');
  render();
});

const topBtn=document.getElementById('top-btn');
window.addEventListener('scroll',()=>topBtn.classList.toggle('show',window.scrollY>240),{passive:true});
topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

loadData();
</script>
</body>
</html>
